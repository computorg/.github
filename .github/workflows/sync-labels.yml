name: Sync editorial labels

on:
  push:
    branches: [main]
    paths:
      - .github/labels.json
      - .github/workflows/sync-labels.yml
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

jobs:
  list-repos:
    runs-on: ubuntu-latest
    outputs:
      repos: ${{ steps.list.outputs.repos }}
    steps:
      - name: List public editorial repos
        id: list
        env:
          GH_TOKEN: ${{ secrets.LABEL_SYNC_TOKEN }}
        run: |
          repos=$(gh repo list computorg --limit 200 --json name,isPrivate \
            --jq '[.[] | select(.isPrivate == false) | select(.name == "computo-quarto-extension" or (.name | test("^(template-computo-|published-)"))) | .name] | join(",")')
          echo "repos=$repos" >> "$GITHUB_OUTPUT"

  sync:
    needs: list-repos
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.LABEL_SYNC_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - name: Create or update labels on every target repo
        run: |
          IFS=',' read -ra REPOS <<< "${{ needs.list-repos.outputs.repos }}"
          while IFS= read -r label; do
            name=$(jq -r '.name' <<< "$label")
            color=$(jq -r '.color' <<< "$label")
            description=$(jq -r '.description' <<< "$label")
            for repo in "${REPOS[@]}"; do
              echo "Syncing label '$name' on computorg/$repo"
              gh label create "$name" --repo "computorg/$repo" --color "$color" --description "$description" --force
            done
          done < <(jq -c '.[]' .github/labels.json)
